name: gfxgraph-portable-python

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:
  schedule:
    - cron: "35 8 * * *"

permissions:
  contents: read

concurrency:
  group: gfxgraph-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  python:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Upgrade pip
        run: python -m pip install --upgrade pip

      - name: Install package
        run: pip install -e .

      - name: Import smoke
        run: python -c "import gfxgraph; print(gfxgraph.__version__)"

      - name: CLI smoke
        run: gfxgraph --help || true

      - name: Compile python sources
        run: python -m compileall python

      - name: Upload artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: gfxgraph-failure-${{ matrix.python-version }}
          path: |
            **/*.log
          if-no-files-found: ignore
