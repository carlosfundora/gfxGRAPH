name: amd-local-ci

on:
  pull_request:
    paths:
      - 'python/**'
      - 'gfxgraph/**'
      - 'src/**'
      - 'tests/**'
      - 'examples/**'
      - 'pyproject.toml'
      - 'setup.py'
      - 'setup.cfg'
      - 'requirements*.txt'
      - '.github/workflows/amd-local-ci.yml'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: amd-local-ci-${{ github.repository }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  detect:
    name: Detect AMD graph-relevant changes
    runs-on: ubuntu-latest
    outputs:
      python: ${{ steps.filter.outputs.python }}
      amd: ${{ steps.filter.outputs.amd }}
      graph: ${{ steps.filter.outputs.graph }}
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - id: filter
        shell: bash
        run: |
          set -euo pipefail
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            git fetch --no-tags --depth=1 origin "${{ github.base_ref }}"
            changed="$(git diff --name-only "origin/${{ github.base_ref }}...HEAD")"
          else
            changed="$(git diff --name-only HEAD~1...HEAD || true)"
          fi
          python=false
          amd=false
          graph=false
          while IFS= read -r file; do
            [[ -z "$file" ]] && continue
            case "$file" in
              python/*|python/**|gfxgraph/*|gfxgraph/**|src/*|src/**|tests/*|tests/**|examples/*|examples/**|pyproject.toml|setup.py|setup.cfg|requirements*.txt)
                python=true ;;
            esac
            case "$file" in
              *amd*|*AMD*|*gfx*|*GFX*|*rocm*|*ROCm*|*ROCM*|*hip*|*HIP*|*vulkan*|*Vulkan*)
                amd=true ;;
            esac
            case "$file" in
              *graph*|*Graph*|*capture*|*Capture*|*stream*|*Stream*|*kernel*|*Kernel*)
                graph=true ;;
            esac
          done <<< "$changed"
          printf '%s\n' "$changed"
          echo "python=$python" >> "$GITHUB_OUTPUT"
          echo "amd=$amd" >> "$GITHUB_OUTPUT"
          echo "graph=$graph" >> "$GITHUB_OUTPUT"

  python-smoke:
    name: Python package smoke
    needs: detect
    if: github.event_name == 'workflow_dispatch' || needs.detect.outputs.python == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Compile Python sources
        run: python -m compileall python gfxgraph || true

  amd-graph-smoke:
    name: AMD graph smoke
    needs: detect
    if: github.event_name == 'workflow_dispatch' || needs.detect.outputs.amd == 'true' || needs.detect.outputs.graph == 'true'
    runs-on: [self-hosted, linux, x64, amd, rocm, hip, gfx1030]
    timeout-minutes: 45
    env:
      HSA_OVERRIDE_GFX_VERSION: '10.3.0'
      AMDGPU_TARGETS: gfx1030
      PYTORCH_ROCM_ARCH: gfx1030
      ROCM_PATH: /opt/rocm
      HIP_PATH: /opt/rocm
    steps:
      - uses: actions/checkout@v5
      - name: Show AMD ROCm environment
        run: |
          rocminfo | head -n 80 || true
          hipconfig || true
      - name: Python AMD visibility smoke
        run: |
          python - <<'PY'
          import importlib.util
          print('gfxgraph importable:', bool(importlib.util.find_spec('gfxgraph')))
          try:
              import torch
              print('torch:', torch.__version__)
              print('rocm/cuda available:', torch.cuda.is_available())
              if torch.cuda.is_available():
                  print('device:', torch.cuda.get_device_name(0))
          except Exception as exc:
              print('torch smoke skipped:', exc)
          PY
